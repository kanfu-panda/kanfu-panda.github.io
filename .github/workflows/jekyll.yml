name: Jekyll site CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
      GA_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
      GITALK_ID: ${{ secrets.GITALK_CLIENT_ID }}
      GITALK_SECRET: ${{ secrets.GITALK_CLIENT_SECRET }}

    steps:
    - uses: actions/checkout@v4

    - name: 密钥扫描规则自检（防止规则本身回归）
      run: bash scripts/scan-secrets.sh --self-test

    - name: 密钥扫描（防止误提交）
      run: bash scripts/scan-secrets.sh

    - name: 设置 Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .ruby-version
        bundler-cache: true

    - name: 设置页面缓存
      uses: actions/configure-pages@v3

    - name: 安装依赖
      run: bundle install

    - name: 检查 Secrets（缺失则降级，不再硬失败）
      id: secrets_check
      run: |
        # fork PR 拿不到 secrets，正常 push 才有。
        # 缺失时跳过相关组件注入，让构建仍然成功。
        SECRETS_OK=true
        if [ -z "$GA_ID" ]; then
          echo "::warning::GOOGLE_ANALYTICS_ID 未配置，将跳过统计脚本注入"
          SECRETS_OK=false
        else
          echo "✓ GOOGLE_ANALYTICS_ID 已配置 (长度: ${#GA_ID})"
        fi
        if [ -z "$GITALK_ID" ] || [ -z "$GITALK_SECRET" ]; then
          echo "::warning::评论组件凭证未配置，将跳过其注入"
          SECRETS_OK=false
        else
          echo "✓ 评论组件凭证已配置 (ID 长度: ${#GITALK_ID}, SECRET 长度: ${#GITALK_SECRET})"
        fi
        echo "secrets_ok=$SECRETS_OK" >> "$GITHUB_OUTPUT"

    - name: 创建密钥配置（只写已配置的字段，避免空值进 HTML）
      run: |
        rm -f _config_secrets.yml
        {
          echo "# Auto-generated secrets configuration (DO NOT COMMIT)"
          if [ -n "$GA_ID" ]; then
            echo "google_analytics: $GA_ID"
          fi
          if [ -n "$GITALK_ID" ] && [ -n "$GITALK_SECRET" ]; then
            echo "gitalk:"
            echo "  clientID: $GITALK_ID"
            echo "  clientSecret: $GITALK_SECRET"
          fi
        } > _config_secrets.yml
        echo "_config_secrets.yml 结构（敏感值已隐去）:"
        sed -E 's/(clientID|clientSecret|google_analytics):.*/\1: ***REDACTED***/' _config_secrets.yml

    - name: 构建站点
      run: |
        echo "JEKYLL_ENV: $JEKYLL_ENV"
        bundle exec jekyll build --config _config.yml,_config_secrets.yml --trace

    - name: 验证构建产物（CSP / SRI / 条件注入）
      run: |
        FAIL=0
        # 1. CSP 必须存在
        if grep -q "Content-Security-Policy" _site/index.html; then
          echo "✓ CSP meta 已注入"
        else
          echo "::error::CSP meta 缺失"; FAIL=1
        fi
        # 2. SRI 必须存在（任一 integrity 即可）
        if grep -q 'integrity="sha384-' _site/index.html; then
          echo "✓ SRI integrity 已注入"
        else
          echo "::error::SRI integrity 缺失"; FAIL=1
        fi
        # 3. 不允许出现 @latest（防回归）；仅扫描产物中的 HTML / JS / CSS
        if grep -rln --include='*.html' --include='*.js' --include='*.css' \
             'cdn.jsdelivr.net/npm/[^"]*@latest' _site/ ; then
          echo "::error::发现 @latest 引用，必须锁定具体版本"; FAIL=1
        else
          echo "✓ 未发现 @latest"
        fi
        # 4. 条件注入：仅在 secrets 完备时验证组件已注入
        if [ "${{ steps.secrets_check.outputs.secrets_ok }}" = "true" ]; then
          grep -rq "gtag('config'" _site/ \
            && echo "✓ 统计脚本已注入" \
            || { echo "::error::统计脚本未注入但 secrets 完备"; FAIL=1; }
          grep -rq "gitalk.render" _site/ \
            && echo "✓ 评论组件已注入" \
            || { echo "::error::评论组件未注入但 secrets 完备"; FAIL=1; }
        else
          echo "（secrets 不完整，跳过组件注入验证）"
        fi
        # 5. aitm 产品页与下载资源齐全
        if [ -f _site/aitm/index.html ] && grep -q "aitm" _site/aitm/index.html; then
          echo "✓ aitm 产品页已渲染"
        else
          echo "::error::aitm 产品页缺失或内容不完整"; FAIL=1
        fi
        # 5.1 多语言（i18n）3 套页面齐全
        for lang_path in "" "zh/" "ja/"; do
          for page in "" "about/" "aitm/" "projects/" "search/" "tags/"; do
            file="_site/${lang_path}${page}index.html"
            if [ -f "$file" ]; then
              echo "✓ /${lang_path}${page}"
            else
              echo "::error::缺失多语言页面 /${lang_path}${page}"; FAIL=1
            fi
          done
        done
        # 5.2 hreflang 注入校验：每个产品页都应含 4 条 alternate（en/zh/ja/x-default）
        for lang_path in "" "zh/" "ja/"; do
          count=$(grep -oE 'rel="alternate" hreflang="[^"]+"' "_site/${lang_path}aitm/index.html" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$count" -ge 4 ]; then
            echo "✓ /${lang_path}aitm/ 含 $count 条 hreflang"
          else
            echo "::error::/${lang_path}aitm/ hreflang 数量不足: $count（应 ≥4）"; FAIL=1
          fi
        done
        # 5.3 邮箱不应作为连续字符串出现在任何 HTML 产物中
        if grep -rln "slbluefox@gmail.com" _site/ 2>/dev/null; then
          echo "::error::邮箱明文出现在产物中"; FAIL=1
        else
          echo "✓ 邮箱明文未泄露"
        fi
        DMG=$(ls _site/assets/downloads/aitm_*_aarch64.dmg 2>/dev/null | head -1)
        if [ -n "$DMG" ] && [ -s "$DMG" ]; then
          echo "✓ aitm dmg 已部署: $(basename "$DMG") ($(stat -c%s "$DMG" 2>/dev/null || stat -f%z "$DMG") 字节)"
        else
          echo "::error::aitm dmg 缺失或为空"; FAIL=1
        fi
        SHA_FILE=$(ls _site/assets/downloads/aitm_*_aarch64.dmg.sha256 2>/dev/null | head -1)
        if [ -n "$SHA_FILE" ] && [ -n "$DMG" ]; then
          EXPECTED=$(awk '{print $1}' "$SHA_FILE")
          ACTUAL=$(sha256sum "$DMG" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$DMG" | awk '{print $1}')
          if [ "$EXPECTED" = "$ACTUAL" ]; then
            echo "✓ dmg SHA256 与公开校验和一致"
          else
            echo "::error::dmg SHA256 不匹配（公开: $EXPECTED / 实际: $ACTUAL）"; FAIL=1
          fi
        else
          echo "::error::SHA256 文件或 dmg 文件缺失"; FAIL=1
        fi
        if [ -f _site/assets/downloads/install-aitm.sh ]; then
          echo "✓ install-aitm.sh 已部署"
        else
          echo "::error::install-aitm.sh 缺失"; FAIL=1
        fi
        # aitm 自动更新清单（latest.json）：version 字段必须与实际 dmg 版本号匹配
        if [ -f _site/assets/aitm/latest.json ]; then
          DMG_NAME=$(basename "$DMG")
          DMG_VERSION=$(echo "$DMG_NAME" | sed -E 's/^aitm_([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          JSON_VERSION=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' _site/assets/aitm/latest.json | sed -E 's/.*"([^"]+)"$/\1/')
          if [ "$DMG_VERSION" = "$JSON_VERSION" ]; then
            echo "✓ latest.json 版本 ($JSON_VERSION) 与 dmg 一致"
          else
            echo "::error::latest.json version=$JSON_VERSION 与 dmg version=$DMG_VERSION 不一致"; FAIL=1
          fi
          # download_url 字段也要包含正确的 dmg 文件名
          if grep -q "$DMG_NAME" _site/assets/aitm/latest.json; then
            echo "✓ latest.json download_url 指向 $DMG_NAME"
          else
            echo "::error::latest.json download_url 未指向当前 dmg ($DMG_NAME)"; FAIL=1
          fi
        else
          echo "::error::assets/aitm/latest.json 缺失（aitm 自动更新依赖）"; FAIL=1
        fi
        [ $FAIL -eq 0 ] || exit 1

    - name: 上传构建产物
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

    - name: 清理缓存
      if: always()
      run: bundle clean --force

  # 部署仅在 main 分支触发，独立 job 携带 environment（避免 PR 触发时被环境保护规则拒绝）
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: 部署到 GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        timeout: 600000
