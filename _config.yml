title: 功夫熊猫的博客
description: >-
  一个热爱技术的开发者的个人博客
baseurl: ""
url: "https://kanfu-panda.github.io"
github_username: kanfu-panda

# 多语言（jekyll-polyglot）
# default_lang 是英文：根路径 / 是英文版，/zh/ 是中文版，/ja/ 是日文版
languages: ["en", "zh", "ja"]
default_lang: "en"
# 这些路径所有语言共用，不参与本地化复制
exclude_from_localization:
  - "assets/"
  - "arcade/"      # arcade 模拟器 SPA，自带独立 CSP，三语共用同一份
  - "feed.xml"
  - "search.json"
  - "robots.txt"
  - "404.html"
# 并行构建加速
parallel_localization: true

# Gitalk 评论系统（暂时关闭：clientID/Secret 未配置会显示 Bad credentials）
gitalk:
  enable: false

# Analytics settings
google_analytics: "" # Will be set by GitHub Actions in production

# Build settings
markdown: kramdown

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-polyglot
  - jekyll-sitemap

# 导航菜单
header_pages:
  - blog.md
  - about.md
  - projects.md

# 不参与构建（仓库元文件 / 内部脚本 / 内部文档）
exclude:
  - CLAUDE.md
  - SECURITY.md
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - docs/
  - scripts/
  - .ruby-version
  - .env.local.example
  - vendor/
