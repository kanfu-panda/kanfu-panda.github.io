title: 功夫熊猫的博客
description: >-
  一个热爱技术的开发者的个人博客
baseurl: ""
url: "https://kanfu-panda.github.io"
github_username: kanfu-panda

# 多语言（jekyll-polyglot）
# default_lang 是英文：根路径 / 是英文版，/zh/ 是中文版，/ja/ 是日文版
languages: ["en", "zh", "ja"]
default_lang: "en"
# 这些路径所有语言共用，不参与本地化复制
exclude_from_localization:
  - "assets/"
  - "arcade/"      # arcade 模拟器 SPA，自带独立 CSP，三语共用同一份
  - "feed.xml"
  - "search.json"
  - "robots.txt"
  - "404.html"
# 并行构建加速
parallel_localization: true

# Giscus 评论系统（基于 GitHub Discussions）
# repo_id / category_id 是公开标识符，不是密钥，可安全入仓（区别于 Gitalk 的 clientSecret）。
# 启用步骤见 docs/comments-giscus.md：在 giscus.app 生成 repo_id / category_id 填入即可。
# repo_id 为空时评论框不渲染（安全默认，配好前不报错）。
giscus:
  enable: true
  repo: "kanfu-panda/kanfu-panda.github.io"
  repo_id: "R_kgDOOzsMhw"           # 公开标识符，非密钥
  category: "Announcements"
  category_id: "DIC_kwDOOzsMh84C-y_s"  # 公开标识符，非密钥
  mapping: "pathname"         # 按 URL 建讨论串（三语各自独立）；改 "og:title" 可三语共享
  reactions_enabled: "0"      # 关闭顶部反应区，评论框更紧凑（空白反应区占高度）
  input_position: "bottom"
  loading: "lazy"             # 懒加载：滚动到评论区附近才加载 iframe

# Analytics settings
google_analytics: "" # Will be set by GitHub Actions in production

# Build settings
markdown: kramdown

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-polyglot
  - jekyll-sitemap

# 导航菜单
header_pages:
  - blog.md
  - about.md
  - projects.md

# 不参与构建（仓库元文件 / 内部脚本 / 内部文档）
exclude:
  - CLAUDE.md
  - SECURITY.md
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - docs/
  - scripts/
  - .ruby-version
  - .env.local.example
  - vendor/
